<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MFA Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<style>
*,::before,::after{box-sizing:border-box;margin:0;padding:0;}

/* ══════════════════════════════════════════
   THEME TOKENS
══════════════════════════════════════════ */
[data-theme="a"] {
  --bg:#F3EFF4;--surface:#FFFBFE;--surface2:#F3EFF4;--surface3:#EDE8F5;
  --card:#FFFBFE;--card-hover:#F5F0FC;
  --outline:#CAC4D0;--outline2:#E7E0EC;
  --primary:#6750A4;--primary-c:#EADDFF;--on-primary:#fff;--on-primary-c:#21005D;
  --on-surface:#1C1B1F;--on-surface-v:#49454F;
  --success:#146C2E;--warn:#7D5700;--danger:#B3261E;
  --cat-work:#4A6CF7;--cat-finance:#006E2E;--cat-personal:#7D5260;
  --shadow:0 1px 3px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.08);
  --shadow2:0 4px 16px rgba(0,0,0,.12);
}
[data-theme="b"] {
  --bg:#07090F;--surface:#0D1220;--surface2:#131B2E;--surface3:#1A2540;
  --card:#131B2E;--card-hover:#1E2E4A;
  --outline:#2A3A58;--outline2:#1E2E48;
  --primary:#4F8EF7;--primary-c:#0D2A66;--on-primary:#fff;--on-primary-c:#C2D8FF;
  --on-surface:#E2F0FF;--on-surface-v:#7DAAD6;
  --success:#34D399;--warn:#FBBF24;--danger:#F87171;
  --cat-work:#60A5FA;--cat-finance:#34D399;--cat-personal:#C084FC;
  --shadow:0 1px 4px rgba(0,0,0,.4),0 2px 12px rgba(0,0,0,.3);
  --shadow2:0 4px 20px rgba(0,0,0,.5);
}
[data-theme="c"] {
  --bg:#111318;--surface:#1E2128;--surface2:#22262F;--surface3:#2A2D36;
  --card:#1E2128;--card-hover:#252930;
  --outline:#3C4043;--outline2:#2E3135;
  --primary:#8AB4F8;--primary-c:#1A3354;--on-primary:#0D2137;--on-primary-c:#C2D8FF;
  --on-surface:#E8EAED;--on-surface-v:#9AA0A6;
  --success:#81C995;--warn:#F9BC2A;--danger:#F28B82;
  --cat-work:#669DF6;--cat-finance:#52D3A2;--cat-personal:#C58AF9;
  --shadow:0 1px 4px rgba(0,0,0,.5),0 2px 12px rgba(0,0,0,.35);
  --shadow2:0 4px 24px rgba(0,0,0,.55);
}
[data-theme="d"] {
  --bg:#050E08;--surface:#0D1B12;--surface2:#112016;--surface3:#16301F;
  --card:#0D1B12;--card-hover:#162A1E;
  --outline:#1F3D28;--outline2:#173020;
  --primary:#00C58E;--primary-c:#003D2B;--on-primary:#002318;--on-primary-c:#A7F3D0;
  --on-surface:#ECFDF5;--on-surface-v:#6EE7B7;
  --success:#34D399;--warn:#FBBF24;--danger:#F87171;
  --cat-work:#67E8F9;--cat-finance:#00C58E;--cat-personal:#A78BFA;
  --shadow:0 1px 4px rgba(0,0,0,.5),0 2px 16px rgba(0,0,0,.4);
  --shadow2:0 4px 24px rgba(0,0,0,.6);
}
[data-theme="e"] {
  --bg:#FDF0F3;--surface:#FFF8F9;--surface2:#FFF0F3;--surface3:#FFE4EA;
  --card:#FFF8F9;--card-hover:#FFF0F3;
  --outline:#E8B4C0;--outline2:#F5D5DC;
  --primary:#C5134E;--primary-c:#FFD6E2;--on-primary:#fff;--on-primary-c:#5C0020;
  --on-surface:#25131A;--on-surface-v:#6D3849;
  --success:#006E2E;--warn:#7D4E00;--danger:#BA1A1A;
  --cat-work:#0061A6;--cat-finance:#006E2E;--cat-personal:#8B008B;
  --shadow:0 1px 3px rgba(197,19,78,.1),0 2px 8px rgba(0,0,0,.07);
  --shadow2:0 4px 16px rgba(197,19,78,.12);
}
[data-theme="f"] {
  --bg:#0E0B06;--surface:#1A1408;--surface2:#211A0C;--surface3:#2C2310;
  --card:#1A1408;--card-hover:#251D0F;
  --outline:#3A3018;--outline2:#2E2612;
  --primary:#F5A623;--primary-c:#3D2900;--on-primary:#1F1400;--on-primary-c:#FFE0A3;
  --on-surface:#F5EDD8;--on-surface-v:#C4A96A;
  --success:#6EE7B7;--warn:#FCD34D;--danger:#FCA5A5;
  --cat-work:#93C5FD;--cat-finance:#6EE7B7;--cat-personal:#F0ABFC;
  --shadow:0 1px 4px rgba(0,0,0,.5),0 2px 14px rgba(0,0,0,.4);
  --shadow2:0 4px 24px rgba(0,0,0,.6);
}
[data-theme="g"] {
  --bg:#E8F0FE;--surface:#FFFFFF;--surface2:#EEF3FF;--surface3:#E3EEFF;
  --card:#F8FAFF;--card-hover:#EEF3FF;
  --outline:#B0C4E8;--outline2:#D3E3FD;
  --primary:#0B57D0;--primary-c:#C2E7FF;--on-primary:#fff;--on-primary-c:#001D35;
  --on-surface:#001D35;--on-surface-v:#004A77;
  --success:#146C2E;--warn:#7D5700;--danger:#B3261E;
  --cat-work:#0B57D0;--cat-finance:#006E2E;--cat-personal:#6750A4;
  --shadow:0 1px 3px rgba(11,87,208,.1),0 2px 8px rgba(0,0,0,.08);
  --shadow2:0 4px 16px rgba(11,87,208,.14);
}

/* ══════════════════════════════════════════
   BASE
══════════════════════════════════════════ */
body {
  background:#1C1C20;
  font-family:'Inter',-apple-system,sans-serif;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
}
.scene{display:flex;flex-direction:column;align-items:center;gap:16px;}

.app {
  width:400px;height:720px;
  background:var(--surface);
  border-radius:24px;overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:var(--shadow2),0 0 0 1px rgba(255,255,255,.04);
  position:relative;
  transition:background .3s,box-shadow .3s;
}

/* ── Top Bar ── */
.top-bar {
  height:56px;background:var(--surface2);
  display:flex;align-items:center;
  padding:0 8px 0 12px;gap:4px;flex-shrink:0;
  transition:background .3s;
}
.traffic{display:flex;gap:6px;margin-right:4px;}
.traffic span{width:12px;height:12px;border-radius:50%;display:block;}
.t-r{background:#FF5F57;}.t-y{background:#FEBC2E;}.t-g{background:#28C840;}
.bar-center{flex:1;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;}
.bar-title{font-size:16px;font-weight:700;color:var(--on-surface);letter-spacing:-.2px;transition:color .3s;}
.bar-sub{font-size:11px;color:var(--on-surface-v);transition:color .3s;}
.icon-btn{
  width:36px;height:36px;border-radius:50%;border:none;
  background:transparent;color:var(--on-surface-v);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,color .3s;
}
.icon-btn:hover{background:rgba(128,128,128,.12);}
.icon-btn .material-icons-round{font-size:20px;}

/* ── Search ── */
.search-wrap{padding:10px 12px 0;flex-shrink:0;}
.search-bar{
  display:flex;align-items:center;
  background:var(--surface3);border-radius:24px;height:42px;
  padding:0 14px;gap:6px;border:1px solid var(--outline2);
  transition:background .3s,border-color .2s;
}
.search-bar:focus-within{border-color:var(--primary);}
.search-bar .material-icons-round{font-size:18px;color:var(--on-surface-v);flex-shrink:0;}
.search-input{
  flex:1;border:none;background:transparent;
  font-size:14px;font-family:'Inter',sans-serif;
  color:var(--on-surface);outline:none;
}
.search-input::placeholder{color:var(--on-surface-v);}

/* ── List ── */
.list{
  flex:1;overflow-y:auto;padding:8px 0 12px;
  scrollbar-width:thin;scrollbar-color:var(--outline) transparent;
}
.list::-webkit-scrollbar{width:3px;}
.list::-webkit-scrollbar-thumb{background:var(--outline);border-radius:3px;}

/* Section header */
.sec-hd{display:flex;align-items:center;padding:10px 16px 4px;gap:8px;}
.sec-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sec-label{font-size:10px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--on-surface-v);}
.sec-line{flex:1;height:1px;background:var(--outline2);}
.sec-count{font-size:10px;color:var(--on-surface-v);font-weight:600;}

/* ── Card ── */
.card{
  margin:3px 12px;
  background:var(--card);border:1px solid var(--outline2);
  border-radius:14px;cursor:pointer;
  position:relative;overflow:visible;
  transition:background .2s,box-shadow .2s,transform .15s,border-color .3s;
  animation:fadeUp .28s ease both;
}
.card:hover{background:var(--card-hover);box-shadow:var(--shadow);transform:translateY(-1px);}
.card:active{transform:scale(.99);}
.card.selected{border-color:var(--primary);box-shadow:0 0 0 2px rgba(128,160,255,.2);}
.card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  border-radius:3px 0 0 3px;
}
.card[data-cat="work"]::before   {background:var(--cat-work);}
.card[data-cat="finance"]::before{background:var(--cat-finance);}
.card[data-cat="personal"]::before{background:var(--cat-personal);}

.card-in{padding:12px 14px 12px 18px;}
.card-r1{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.avatar{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;background:var(--surface3);
  transition:background .3s;
}
.card-txt{flex:1;min-width:0;}
.card-issuer{
  font-size:14px;font-weight:600;color:var(--on-surface);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .3s;
}
.card-label{
  font-size:11px;color:var(--on-surface-v);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .3s;
}

/* ── Context menu button ── */
.menu-btn{
  width:32px;height:32px;border-radius:50%;border:none;background:transparent;
  color:var(--on-surface-v);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background .2s;
  position:relative;z-index:1;
}
.menu-btn:hover{background:rgba(128,128,128,.12);}
.menu-btn .material-icons-round{font-size:18px;}

/* ── Context Menu Dropdown ── */
.ctx-menu{
  position:absolute;right:12px;top:44px;
  background:var(--surface2);border:1px solid var(--outline2);
  border-radius:12px;padding:4px;
  box-shadow:var(--shadow2);
  z-index:100;
  opacity:0;transform:scale(.92) translateY(-6px);transform-origin:top right;
  pointer-events:none;transition:opacity .18s,transform .18s;
  min-width:140px;
}
.ctx-menu.open{opacity:1;transform:scale(1) translateY(0);pointer-events:all;}
.ctx-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:8px;
  font-size:13px;font-weight:500;color:var(--on-surface);
  cursor:pointer;transition:background .15s;border:none;background:transparent;
  width:100%;font-family:'Inter',sans-serif;
}
.ctx-item:hover{background:rgba(128,128,128,.1);}
.ctx-item.danger{color:var(--danger);}
.ctx-item .material-icons-round{font-size:16px;color:var(--on-surface-v);}
.ctx-item.danger .material-icons-round{color:var(--danger);}
.ctx-divider{height:1px;background:var(--outline2);margin:4px 0;}

/* ── OTP row ── */
.card-r2{display:flex;align-items:center;gap:8px;}

/* masked / revealed */
.otp{
  font-family:'Roboto Mono',monospace;
  font-size:26px;font-weight:500;letter-spacing:5px;
  color:var(--primary);flex:1;
  transition:color .3s;user-select:none;
}
.otp.masked{
  letter-spacing:4px;
  color:var(--on-surface-v) !important;
}
.otp.warn  {color:var(--warn);}
.otp.danger{color:var(--danger);}

/* reveal hint */
.reveal-hint{
  font-size:10px;font-weight:600;color:var(--on-surface-v);
  opacity:0;transition:opacity .2s;white-space:nowrap;
  display:flex;align-items:center;gap:3px;
}
.reveal-hint .material-icons-round{font-size:13px;}
.card:hover .reveal-hint{opacity:1;}
.card.revealed .reveal-hint{display:none;}

/* copy chip */
.copy-chip{
  display:flex;align-items:center;gap:3px;
  height:28px;padding:0 12px 0 8px;border-radius:8px;
  background:var(--primary-c);border:none;
  font-size:11px;font-weight:700;font-family:'Inter',sans-serif;
  color:var(--on-primary-c);cursor:pointer;
  opacity:0;transform:scale(.88);
  transition:opacity .18s,transform .18s,background .3s,color .3s;
  white-space:nowrap;
}
.card.revealed .copy-chip{opacity:1;transform:scale(1);}
.card.copied .copy-chip{background:var(--success);color:#fff;}
.copy-chip .material-icons-round{font-size:13px;}

/* Timer */
.timer-wrap{position:relative;width:38px;height:38px;flex-shrink:0;}
.timer-svg{transform:rotate(-90deg);}
.t-bg{fill:none;stroke:var(--outline2);stroke-width:2.5;}
.t-ring{fill:none;stroke-width:2.5;stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke .4s;}
.t-num{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;font-family:'Roboto Mono',monospace;
}

/* ── Card Row 3: username + password (TOTP cards) ── */
.card-r3{
  display:flex;align-items:center;gap:8px;
  margin-top:8px;padding-top:8px;
  border-top:1px solid var(--outline2);
  max-height:0;opacity:0;overflow:hidden;
  transition:max-height .25s ease,opacity .2s,margin-top .2s,padding-top .2s;
}
.card.revealed .card-r3{
  max-height:60px;opacity:1;
  margin-top:8px;padding-top:8px;
}
.card-r3 .cred-label{
  font-size:10px;font-weight:600;color:var(--on-surface-v);
  flex-shrink:0;min-width:32px;text-align:right;
}
.card-r3 .cred-val{
  font-size:13px;color:var(--on-surface);font-family:'Roboto Mono',monospace;
  flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.card-r3 .cred-val.masked-pw{
  color:var(--on-surface-v);letter-spacing:2px;
}
.pw-toggle{
  width:26px;height:26px;border-radius:50%;border:none;
  background:transparent;color:var(--on-surface-v);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;flex-shrink:0;
}
.pw-toggle:hover{background:rgba(128,128,128,.12);}
.pw-toggle .material-icons-round{font-size:16px;}

/* ── Password-type card row 2 ── */
.card-r2-pw{
  display:flex;align-items:center;gap:8px;
}
.pw-display{
  font-family:'Roboto Mono',monospace;
  font-size:18px;font-weight:500;letter-spacing:4px;
  color:var(--on-surface-v);flex:1;
  transition:color .3s;user-select:none;
}
.pw-display.revealed-pw{
  letter-spacing:1.5px;color:var(--on-surface);
}

/* ── Bottom Nav (FAB integrated) ── */
.bot-nav{
  height:68px;background:var(--surface2);
  display:flex;align-items:center;justify-content:space-around;
  flex-shrink:0;padding:0 4px;transition:background .3s;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  cursor:pointer;border:none;background:transparent;
  flex:1;padding:4px 0;border-radius:12px;
  transition:background .2s;
}
.nav-item:hover{background:rgba(128,128,128,.08);}
.nav-pill{
  width:56px;height:28px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;
}
.nav-item.act .nav-pill{background:var(--primary-c);}
.nav-item .material-icons-round{font-size:22px;color:var(--on-surface-v);transition:color .3s;}
.nav-item.act .material-icons-round{color:var(--on-primary-c);}
.nav-label{font-size:10px;font-weight:600;color:var(--on-surface-v);transition:color .3s;}
.nav-item.act .nav-label{color:var(--on-primary-c);}

/* FAB in nav */
.nav-fab{
  width:52px;height:52px;border-radius:14px;
  background:var(--primary);border:none;
  color:var(--on-primary);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(0,0,0,.3);
  cursor:pointer;transition:all .22s;flex-shrink:0;
  margin-bottom:6px;
}
.nav-fab:hover{transform:scale(1.06);box-shadow:0 6px 18px rgba(0,0,0,.4);}
.nav-fab:active{transform:scale(.96);}
.nav-fab .material-icons-round{font-size:22px;}

/* ── Bottom Sheet ── */
.scrim{
  position:absolute;inset:0;background:rgba(0,0,0,0);
  z-index:50;display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;transition:opacity .3s,background .3s;
}
.scrim.open{opacity:1;pointer-events:all;background:rgba(0,0,0,.4);}
.sheet{
  width:100%;background:var(--surface);
  border-radius:24px 24px 0 0;padding-bottom:28px;
  transform:translateY(110%);
  transition:transform .32s cubic-bezier(.2,0,0,1),background .3s;
}
.scrim.open .sheet{transform:translateY(0);}
.sheet-top{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;}
.drag-handle{width:32px;height:4px;background:var(--outline);border-radius:2px;margin:12px auto 0;}
.sheet-title{font-size:20px;font-weight:700;color:var(--on-surface);}
.sheet-close{
  width:32px;height:32px;border-radius:50%;border:none;
  background:var(--surface3);color:var(--on-surface-v);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background .2s;
}
.sheet-close:hover{background:var(--outline2);}
.sheet-close .material-icons-round{font-size:18px;}

.scan-zone{
  margin:0 20px 12px;height:110px;border-radius:14px;
  background:var(--surface3);border:1.5px dashed var(--outline);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  cursor:pointer;overflow:hidden;position:relative;
  transition:border-color .2s,background .3s;
}
.scan-zone:hover{border-color:var(--primary);}
.scan-zone .material-icons-round{font-size:28px;color:var(--primary);}
.scan-zone-t{font-size:13px;font-weight:600;color:var(--on-surface);}
.scan-zone-s{font-size:11px;color:var(--on-surface-v);}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--primary),transparent);animation:scanY 2s ease-in-out infinite;}
@keyframes scanY{0%{top:15%}50%{top:85%}100%{top:15%}}

.divider-row{
  display:flex;align-items:center;gap:10px;
  padding:2px 20px 10px;
  font-size:11px;font-weight:600;color:var(--on-surface-v);
}
.divider-row::before,.divider-row::after{content:'';flex:1;height:1px;background:var(--outline2);}

.form{padding:0 20px;display:flex;flex-direction:column;gap:10px;}

/* icon picker row */
.icon-picker-row{display:flex;gap:6px;flex-wrap:wrap;padding:0 0 2px;}
.icon-opt{
  width:36px;height:36px;border-radius:10px;
  background:var(--surface3);border:1.5px solid transparent;
  font-size:18px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;
}
.icon-opt:hover{border-color:var(--primary);}
.icon-opt.picked{border-color:var(--primary);background:var(--primary-c);}

.field{position:relative;}
.field label{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  font-size:14px;color:var(--on-surface-v);
  pointer-events:none;transition:all .2s;padding:0 3px;background:transparent;
}
.field input:focus~label,
.field input:not(:placeholder-shown)~label{
  top:0;font-size:11px;font-weight:600;background:var(--surface);color:var(--primary);
}
.field input,.field select{
  width:100%;height:48px;border:1.5px solid var(--outline);border-radius:10px;
  background:transparent;padding:0 14px;
  font-size:14px;font-family:'Inter',sans-serif;color:var(--on-surface);outline:none;
  transition:border-color .2s;
}
.field input:focus,.field select:focus{border-color:var(--primary);}
.row2{display:flex;gap:10px;}
.row2 .field{flex:1;}
.form-label{font-size:11px;font-weight:700;color:var(--on-surface-v);letter-spacing:.5px;text-transform:uppercase;}

/* password input with toggle */
.field-pw{position:relative;}
.field-pw input{
  width:100%;height:48px;border:1.5px solid var(--outline);border-radius:10px;
  background:transparent;padding:0 70px 0 14px;
  font-size:14px;font-family:'Roboto Mono',monospace;
  color:var(--on-surface);outline:none;transition:border-color .2s;
  letter-spacing:1px;
}
.field-pw input:focus{border-color:var(--primary);}
.field-pw label{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  font-size:14px;color:var(--on-surface-v);
  pointer-events:none;transition:all .2s;padding:0 3px;background:transparent;
}
.field-pw input:focus~label,
.field-pw input:not(:placeholder-shown)~label{
  top:0;font-size:11px;font-weight:600;background:var(--surface);color:var(--primary);
}
.pw-actions{
  position:absolute;right:6px;top:50%;transform:translateY(-50%);
  display:flex;gap:2px;
}
.pw-act{
  width:32px;height:32px;border-radius:50%;border:none;
  background:transparent;color:var(--on-surface-v);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.pw-act:hover{background:rgba(128,128,128,.12);}
.pw-act .material-icons-round{font-size:18px;}

/* type toggle (segment control) */
.type-toggle{
  display:flex;background:var(--surface3);border-radius:10px;
  padding:3px;border:1px solid var(--outline2);
}
.type-btn{
  flex:1;height:36px;border:none;border-radius:8px;
  background:transparent;color:var(--on-surface-v);
  font-size:13px;font-weight:600;font-family:'Inter',sans-serif;
  cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.type-btn.active{
  background:var(--primary);color:var(--on-primary);
  box-shadow:var(--shadow);
}
.type-btn .material-icons-round{font-size:16px;}

/* conditional fields */
.form-totp-only{display:flex;flex-direction:column;gap:10px;}
.form-totp-only.hidden{display:none;}

.btn-fill{
  width:100%;height:46px;background:var(--primary);border:none;border-radius:23px;
  color:var(--on-primary);font-size:14px;font-weight:700;font-family:'Inter',sans-serif;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;
  box-shadow:var(--shadow);transition:opacity .2s,background .3s;
}
.btn-fill:hover{opacity:.9;}
.btn-fill .material-icons-round{font-size:18px;}

/* ── Lock Screen ── */
.lock-ov{
  position:absolute;inset:0;background:var(--surface);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:200;opacity:0;pointer-events:none;transition:opacity .3s,background .3s;
}
.lock-ov.show{opacity:1;pointer-events:all;}
.lock-logo{
  width:72px;height:72px;border-radius:22px;background:var(--primary-c);
  display:flex;align-items:center;justify-content:center;margin-bottom:20px;
  transition:background .3s;
}
.lock-logo .material-icons-round{font-size:36px;color:var(--on-primary-c);}
.lock-h{font-size:24px;font-weight:700;color:var(--on-surface);margin-bottom:4px;}
.lock-sub{font-size:13px;color:var(--on-surface-v);margin-bottom:28px;}

/* PIN dots */
.pin-dots{display:flex;gap:12px;margin-bottom:22px;}
.pin-dot{
  width:12px;height:12px;border-radius:50%;
  border:2px solid var(--outline);transition:all .15s;
}
.pin-dot.on{background:var(--primary);border-color:var(--primary);transform:scale(1.2);}
.pin-dot.err{background:var(--danger);border-color:var(--danger);animation:shake .4s ease;}

/* Keypad */
.keypad{display:grid;grid-template-columns:repeat(3,68px);gap:8px;}
.key{
  width:68px;height:68px;border-radius:50%;border:none;
  background:var(--surface3);color:var(--on-surface);
  font-size:22px;font-weight:400;font-family:'Inter',sans-serif;
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:background .15s,color .3s;position:relative;overflow:hidden;
}
.key:hover{background:var(--primary-c);color:var(--on-primary-c);}
.key:active{opacity:.7;}
.key.ghost{background:transparent;}
.key.ghost:hover{background:var(--surface3);}
.key .material-icons-round{font-size:22px;color:var(--on-surface-v);}
.key-sub{font-size:8px;letter-spacing:1px;color:var(--on-surface-v);line-height:1;}
.lock-err-msg{
  font-size:12px;color:var(--danger);margin-top:12px;height:16px;
  transition:opacity .2s;opacity:0;
}
.lock-err-msg.show{opacity:1;}

/* ── Snackbar ── */
.snack{
  position:absolute;bottom:76px;left:12px;right:12px;
  background:#2A2A2F;color:#ECE6F0;border-radius:10px;
  padding:12px 16px;font-size:13px;font-weight:500;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
  opacity:0;transform:translateY(6px);
  transition:opacity .22s,transform .22s;
  pointer-events:none;z-index:999;
}
.snack.show{opacity:1;transform:translateY(0);pointer-events:all;}
.snack-act{
  font-weight:700;font-size:12px;color:#C2D8FF;cursor:pointer;
  background:none;border:none;font-family:'Inter',sans-serif;margin-left:12px;
}

/* ── Theme Switcher ── */
.theme-switcher{
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;max-width:420px;
}
.theme-label{
  width:100%;text-align:center;
  font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#555;
}
.th-btn{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  cursor:pointer;border:none;background:transparent;padding:4px;border-radius:12px;
  transition:transform .15s;
}
.th-btn:hover{transform:scale(1.1);}
.th-btn.active .th-swatch{outline:3px solid #fff;outline-offset:2px;}
.th-swatch{
  width:36px;height:36px;border-radius:10px;display:flex;overflow:hidden;
  box-shadow:0 2px 6px rgba(0,0,0,.35);
}
.th-half{flex:1;}
.th-name{font-size:9px;font-weight:700;letter-spacing:.5px;color:#666;text-transform:uppercase;}
.th-btn.active .th-name{color:#ddd;}

/* ── Ripple ── */
.rip{position:absolute;border-radius:50%;background:rgba(128,128,128,.15);transform:scale(0);animation:rip .4s linear;pointer-events:none;}
@keyframes rip{to{transform:scale(4);opacity:0;}}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
</style>
</head>
<body>
<div class="scene">

<!-- ══ App Window ══ -->
<div class="app" id="app" data-theme="c">

  <!-- Top Bar: title + account count -->
  <div class="top-bar">

  <!-- Bottom Nav with integrated FAB -->

  <!-- ── Add Account Sheet ── -->
  <div class="scrim" id="scrim" onclick="closeSheetOut(event)">
    <div class="sheet">

      <div class="scan-zone" onclick="simulateScan()">

      <div class="divider-row">或手动输入</div>

      <div class="form">

        </div>

        <!-- Icon picker -->
        <div>
          <div class="form-label" style="margin-bottom:6px;">选择图标</div>
          <div class="icon-picker-row">
            <div class="icon-opt picked" onclick="pickIcon(this)">🔑</div>
            <div class="icon-opt" onclick="pickIcon(this)">🌐</div>
            <div class="icon-opt" onclick="pickIcon(this)">🏦</div>
            <div class="icon-opt" onclick="pickIcon(this)">💼</div>
            <div class="icon-opt" onclick="pickIcon(this)">🛒</div>
            <div class="icon-opt" onclick="pickIcon(this)">☁️</div>
            <div class="icon-opt" onclick="pickIcon(this)">📧</div>
            <div class="icon-opt" onclick="pickIcon(this)">🎮</div>
            <div class="icon-opt" onclick="pickIcon(this)">📱</div>

        </div>

        <div class="row2">
          <div class="field">
            <input type="text" placeholder=" " id="fi"/>

          <div class="field">

        <!-- Password field (shown for both types) -->
        <div class="field-pw">

          <label for="fp">密码</label>
          <div class="pw-actions">
            <button class="pw-act" onclick="toggleSheetPwVis()" title="显示/隐藏">
              <span class="material-icons-round" id="fp-eye">visibility</span>

            <button class="pw-act" onclick="genPassword()" title="生成随机密码">

        <!-- TOTP-only fields -->
        <div class="form-totp-only" id="form-totp">
          <div class="field">

          <div class="row2">
            <div class="field">
              <select><option>TOTP (30s)</option><option>HOTP</option></select>
            </div>
            <div class="field">
              <select id="fcat"><option value="work">工作</option><option value="finance">财务</option><option value="personal">个人</option></select>

        <!-- Password-only: category -->
        <div class="field" id="form-pw-cat" style="display:none;">

        <button class="btn-fill" id="sheet-submit" onclick="submitSheet()">
          <span class="material-icons-round">add</span>添加账户
        </button>

    </div>
  </div>

  <!-- ── Lock Screen ── -->
  <div class="lock-ov" id="lockOv">
    <div class="lock-logo"><span class="material-icons-round">lock</span></div>
    <div class="lock-h">MFA Manager</div>
    <div class="lock-sub">输入 PIN 码解锁</div>
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
      <div class="pin-dot" id="d4"></div><div class="pin-dot" id="d5"></div>

      <button class="key" onclick="kp('1')">1<span class="key-sub"></span></button>

</div><!-- /app -->

<!-- ── Theme Switcher ── -->
<div class="theme-switcher">
  <div class="theme-label">配色方案</div>
  <button class="th-btn" onclick="setTheme('a')" id="tb-a">

<script>
const app = document.getElementById('app');

/* ══════════════════════════════════════════
   DATA MODEL
══════════════════════════════════════════ */
const accounts = [
  { id:0, icon:'🐙', issuer:'GitHub',    label:'user@example.com',    username:'user@example.com',    password:'Gh!tHub#2024', secret:'482193', cat:'work',     type:'totp' },
  { id:1, icon:'☁️', issuer:'AWS',        label:'admin@company.com',   username:'admin@company.com',   password:'Aws$ecure99',  secret:'735028', cat:'work',     type:'totp' },
  { id:2, icon:'💬', issuer:'Slack',      label:'work@company.com',    username:'work@company.com',    password:'Sl@ck2024!',   secret:'901274', cat:'work',     type:'totp' },
  { id:3, icon:'🏦', issuer:'招商银行',   label:'138****8888',         username:'13888888888',          password:'Cmb@2024bank', secret:'318450', cat:'finance',  type:'totp' },
  { id:4, icon:'📘', issuer:'Facebook',   label:'my@gmail.com',        username:'my@gmail.com',        password:'Fb@pass!23',   secret:'573916', cat:'personal', type:'totp' },
  { id:5, icon:'🌐', issuer:'路由器',     label:'192.168.1.1',         username:'admin',               password:'router2024',   secret:null,     cat:'personal', type:'password' },
  { id:6, icon:'💼', issuer:'公司内网',   label:'vpn.company.com',     username:'zhang.san',           password:'Corp#Vpn2024', secret:null,     cat:'work',     type:'password' },
];

/* timer state — only for totp accounts */
const timers = [{t:12},{t:22},{t:6},{t:25},{t:15}]; // indices 0-4 map to totp accounts by filter order

const CIRC = 2 * Math.PI * 16; // 100.5

/* ── RENDER ── */
function renderList() {
  const list = document.getElementById('list');
  const cats = ['work','finance','personal'];
  const catLabels = { work:'工作', finance:'财务', personal:'个人' };
  let html = '';

  cats.forEach(cat => {
    const items = accounts.filter(a => a.cat === cat);
    if (items.length === 0) return;

    html += `<div class="sec-hd" data-sec="${cat}">
      <div class="sec-dot" style="background:var(--cat-${cat})"></div>
      <span class="sec-label">${catLabels[cat]}</span>
      <div class="sec-line"></div>
      <span class="sec-count">${items.length}</span>
    </div>`;

    items.forEach(acct => {
      html += renderCard(acct);
    });
  });

  list.innerHTML = html;
  updateAcctCount();
  syncTimerColors();
}

function renderCard(acct) {
  const isTotp = acct.type === 'totp';

  // row 2 depends on type
  let r2 = '';
  if (isTotp) {
    // find timer index: position among totp accounts
    const totpIdx = accounts.filter(a => a.type === 'totp').indexOf(acct);
    const t = timers[totpIdx] ? timers[totpIdx].t : 30;
    r2 = `<div class="card-r2">
      <div class="otp masked" id="otp-${acct.id}">••• •••</div>
      <span class="reveal-hint"><span class="material-icons-round">visibility</span>点击查看</span>
      <button class="copy-chip" onclick="event.stopPropagation();doCopyOtp(${acct.id})" id="cc-${acct.id}">
        <span class="material-icons-round" id="ci-${acct.id}">content_copy</span>
        <span id="ct-${acct.id}">复制</span>
      </button>
      <div class="timer-wrap">
        <svg class="timer-svg" width="38" height="38" viewBox="0 0 38 38">
          <circle class="t-bg" cx="19" cy="19" r="16"/>
          <circle class="t-ring" cx="19" cy="19" r="16" id="ring-${totpIdx}"
            stroke="var(--primary)" stroke-dasharray="100.5" stroke-dashoffset="${CIRC*(1-t/30)}"/>
        </svg>
        <div class="t-num" id="tn-${totpIdx}" style="color:var(--primary)">${t}</div>
      </div>
    </div>`;
  } else {
    r2 = `<div class="card-r2-pw">
      <div class="pw-display masked-pw" id="pw-${acct.id}">••••••••</div>
      <span class="reveal-hint"><span class="material-icons-round">visibility</span>点击查看</span>
      <button class="copy-chip" onclick="event.stopPropagation();doCopyPw(${acct.id})" id="cc-pw-${acct.id}">
        <span class="material-icons-round" id="ci-pw-${acct.id}">content_copy</span>
        <span id="ct-pw-${acct.id}">复制</span>
      </button>
    </div>`;
  }

  // row 3: username + password (TOTP cards only, revealed on click)
  let r3 = '';
  if (isTotp && (acct.username || acct.password)) {
    r3 = `<div class="card-r3">`;
    if (acct.username) {
      r3 += `<span class="cred-label">用户</span>
        <span class="cred-val">${escHtml(acct.username)}</span>`;
    }
    if (acct.password) {
      r3 += `<span class="cred-label" style="margin-left:8px;">密码</span>
        <span class="cred-val masked-pw" id="r3-pw-${acct.id}">••••••••</span>
        <button class="pw-toggle" onclick="event.stopPropagation();toggleR3Pw(${acct.id})">
          <span class="material-icons-round" id="r3-eye-${acct.id}">visibility</span>
        </button>
        <button class="copy-chip" onclick="event.stopPropagation();doCopyPw(${acct.id})" style="opacity:1;transform:scale(1);" id="cc-r3pw-${acct.id}">
          <span class="material-icons-round" id="ci-r3pw-${acct.id}">content_copy</span>
          <span id="ct-r3pw-${acct.id}">复制</span>
        </button>`;
    }
    r3 += `</div>`;
  }

  return `<div class="card" data-cat="${acct.cat}" data-id="${acct.id}" data-type="${acct.type}" onclick="toggleReveal(this)">
    <div class="card-in">
      <div class="card-r1">
        <div class="avatar">${acct.icon}</div>
        <div class="card-txt">
          <div class="card-issuer">${escHtml(acct.issuer)}</div>
          <div class="card-label">${escHtml(acct.label)}</div>
        </div>
        <button class="menu-btn" onclick="toggleCtx(event,this)">
          <span class="material-icons-round">more_vert</span>
        </button>
        <div class="ctx-menu" id="ctx-${acct.id}">
          <button class="ctx-item" onclick="closeCtx();editAccount(${acct.id})">
            <span class="material-icons-round">edit</span>编辑账户
          </button>
          <button class="ctx-item" onclick="closeCtx();showSnack('已移动')">
            <span class="material-icons-round">drive_file_move</span>移动分组
          </button>
          <div class="ctx-divider"></div>
          <button class="ctx-item danger" onclick="closeCtx();deleteAccount(${acct.id})">
            <span class="material-icons-round">delete_outline</span>删除账户
          </button>
        </div>
      </div>
      ${r2}
      ${r3}
    </div>
  </div>`;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function updateAcctCount() {
  document.getElementById('acct-count').textContent = accounts.length + ' 个账户';
}

/* ══════════════════════════════════════════
   THEME
══════════════════════════════════════════ */
function setTheme(t) {
  app.dataset.theme = t;
  document.querySelectorAll('.th-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tb-'+t).classList.add('active');
  setTimeout(syncTimerColors, 20);
}

/* ══════════════════════════════════════════
   TIMER ENGINE
══════════════════════════════════════════ */
function timerColor(idx, t) {
  const cs = getComputedStyle(app);
  if (t <= 5)  return cs.getPropertyValue('--danger').trim();
  if (t <= 10) return cs.getPropertyValue('--warn').trim();
  const defaults = ['--primary','--success','--warn','--success','--cat-personal'];
  return cs.getPropertyValue(defaults[idx] || '--primary').trim();
}

function syncTimerColors() {
  timers.forEach((s, i) => {
    const col = timerColor(i, s.t);
    const ring = document.getElementById('ring-'+i);
    const tn   = document.getElementById('tn-'+i);
    if (ring) ring.style.stroke = col;
    if (tn)   tn.style.color = col;
  });
}

setInterval(() => {
  timers.forEach((s, i) => {
    s.t--; if (s.t <= 0) {
      s.t = 30;
      // re-mask revealed totp cards
      const totpAccounts = accounts.filter(a => a.type === 'totp');
      const acct = totpAccounts[i];
      if (acct) {
        const card = document.querySelector(`.card[data-id="${acct.id}"]`);
        if (card && card.classList.contains('revealed')) {
          card.classList.remove('revealed');
          const otp = document.getElementById('otp-'+acct.id);
          if (otp) { otp.textContent = '••• •••'; otp.classList.add('masked'); }
        }
      }
    }
    const ring = document.getElementById('ring-'+i);
    const tn   = document.getElementById('tn-'+i);
    if (!ring) return;
    ring.style.strokeDashoffset = CIRC * (1 - s.t/30);
    const col = timerColor(i, s.t);
    ring.style.stroke = col;
    tn.style.color = col;
    tn.textContent = s.t;
    // update otp color class
    const totpAccounts = accounts.filter(a => a.type === 'totp');
    const acct = totpAccounts[i];
    if (acct) {
      const otp = document.getElementById('otp-'+acct.id);
      if (otp) {
        const isMasked = otp.classList.contains('masked');
        const colorCls = s.t <= 5 ? 'danger' : s.t <= 10 ? 'warn' : '';
        otp.className = 'otp' + (isMasked ? ' masked' : '') + (colorCls ? ' '+colorCls : '');
      }
    }
  });
}, 1000);

/* ══════════════════════════════════════════
   REVEAL / MASK
══════════════════════════════════════════ */
let revealTimers = {};
function toggleReveal(card) {
  const id = parseInt(card.dataset.id);
  const type = card.dataset.type;
  const isRevealed = card.classList.contains('revealed');

  // close other revealed cards
  document.querySelectorAll('.card.revealed').forEach(c => {
    if (c !== card) {
      const j = parseInt(c.dataset.id);
      c.classList.remove('revealed');
      maskCard(j, c.dataset.type);
      clearTimeout(revealTimers[j]);
    }
  });

  if (isRevealed) {
    card.classList.remove('revealed');
    maskCard(id, type);
    clearTimeout(revealTimers[id]);
  } else {
    card.classList.add('revealed');
    if (type === 'totp') {
      const acct = accounts.find(a => a.id === id);
      if (acct && acct.secret) {
        const otp = document.getElementById('otp-'+id);
        if (otp) {
          const code = acct.secret;
          otp.textContent = code.slice(0,3) + ' ' + code.slice(3);
          otp.classList.remove('masked');
        }
      }
      // auto-hide after 8s
      clearTimeout(revealTimers[id]);
      revealTimers[id] = setTimeout(() => {
        card.classList.remove('revealed');
        maskCard(id, 'totp');
      }, 8000);
    } else {
      // password type: show password
      const acct = accounts.find(a => a.id === id);
      const pwEl = document.getElementById('pw-'+id);
      if (acct && acct.password && pwEl) {
        pwEl.textContent = acct.password;
        pwEl.classList.remove('masked-pw');
        pwEl.classList.add('revealed-pw');
      }
      // auto-hide after 5s
      clearTimeout(revealTimers[id]);
      revealTimers[id] = setTimeout(() => {
        card.classList.remove('revealed');
        maskCard(id, 'password');
      }, 5000);
    }
  }
}

function maskCard(id, type) {
  if (type === 'totp') {
    const otp = document.getElementById('otp-'+id);
    if (otp) { otp.textContent = '••• •••'; otp.classList.add('masked'); }
  }
  const pwEl = document.getElementById('pw-'+id);
  if (pwEl) { pwEl.textContent = '••••••••'; pwEl.classList.add('masked-pw'); pwEl.classList.remove('revealed-pw'); }
  // mask r3 password
  const r3pw = document.getElementById('r3-pw-'+id);
  if (r3pw) { r3pw.textContent = '••••••••'; r3pw.classList.add('masked-pw'); }
  const r3eye = document.getElementById('r3-eye-'+id);
  if (r3eye) r3eye.textContent = 'visibility';
}

/* ── TOTP card row 3 password toggle ── */
let r3PwTimers = {};
function toggleR3Pw(id) {
  const el = document.getElementById('r3-pw-'+id);
  const eye = document.getElementById('r3-eye-'+id);
  if (!el) return;
  const acct = accounts.find(a => a.id === id);
  if (!acct || !acct.password) return;

  if (el.classList.contains('masked-pw')) {
    el.textContent = acct.password;
    el.classList.remove('masked-pw');
    eye.textContent = 'visibility_off';
    clearTimeout(r3PwTimers[id]);
    r3PwTimers[id] = setTimeout(() => {
      el.textContent = '••••••••';
      el.classList.add('masked-pw');
      eye.textContent = 'visibility';
    }, 5000);
  } else {
    el.textContent = '••••••••';
    el.classList.add('masked-pw');
    eye.textContent = 'visibility';
    clearTimeout(r3PwTimers[id]);
  }
}

/* ══════════════════════════════════════════
   COPY
══════════════════════════════════════════ */
const copyTs = {};

function doCopyOtp(id) {
  const acct = accounts.find(a => a.id === id);
  if (!acct || !acct.secret) return;
  const code = acct.secret.slice(0,3) + ' ' + acct.secret.slice(3);
  if (navigator.clipboard) navigator.clipboard.writeText(acct.secret);
  showCopyFeedback(id, 'otp');
  showSnack('验证码已复制，25秒后自动清除剪贴板');
  clearTimeout(copyTs['otp-'+id]);
  copyTs['otp-'+id] = setTimeout(() => {
    resetCopyFeedback(id, 'otp');
    if (navigator.clipboard) navigator.clipboard.writeText('');
  }, 25000);
}

function doCopyPw(id) {
  const acct = accounts.find(a => a.id === id);
  if (!acct || !acct.password) return;
  if (navigator.clipboard) navigator.clipboard.writeText(acct.password);
  // determine which copy chip to update
  const isTotp = acct.type === 'totp';
  if (isTotp) {
    showCopyFeedbackR3(id);
  } else {
    showCopyFeedback(id, 'pw');
  }
  showSnack('密码已复制，15秒后自动清除剪贴板');
  clearTimeout(copyTs['pw-'+id]);
  copyTs['pw-'+id] = setTimeout(() => {
    resetCopyFeedback(id, 'pw');
    resetCopyFeedbackR3(id);
    if (navigator.clipboard) navigator.clipboard.writeText('');
  }, 15000);
}

function showCopyFeedback(id, suffix) {
  const ci = document.getElementById('ci-'+(suffix==='pw'?'pw-':'')+id);
  const ct = document.getElementById('ct-'+(suffix==='pw'?'pw-':'')+id);
  const card = document.querySelector(`.card[data-id="${id}"]`);
  if (ci) ci.textContent = 'check';
  if (ct) ct.textContent = '已复制';
  if (card) card.classList.add('copied');
}

function resetCopyFeedback(id, suffix) {
  const ci = document.getElementById('ci-'+(suffix==='pw'?'pw-':'')+id);
  const ct = document.getElementById('ct-'+(suffix==='pw'?'pw-':'')+id);
  const card = document.querySelector(`.card[data-id="${id}"]`);
  if (ci) ci.textContent = 'content_copy';
  if (ct) ct.textContent = '复制';
  if (card) card.classList.remove('copied');
}

function showCopyFeedbackR3(id) {
  const ci = document.getElementById('ci-r3pw-'+id);
  const ct = document.getElementById('ct-r3pw-'+id);
  if (ci) ci.textContent = 'check';
  if (ct) ct.textContent = '已复制';
}
function resetCopyFeedbackR3(id) {
  const ci = document.getElementById('ci-r3pw-'+id);
  const ct = document.getElementById('ct-r3pw-'+id);
  if (ci) ci.textContent = 'content_copy';
  if (ct) ct.textContent = '复制';
}

/* ══════════════════════════════════════════
   CONTEXT MENU
══════════════════════════════════════════ */
let openCtxId = null;
function toggleCtx(e, btn) {
  e.stopPropagation();
  const menu = btn.nextElementSibling;
  const isOpen = menu.classList.contains('open');
  closeCtx();
  if (!isOpen) { menu.classList.add('open'); openCtxId = menu.id; }
}
function closeCtx() {
  if (openCtxId) {
    document.getElementById(openCtxId)?.classList.remove('open');
    openCtxId = null;
  }
}
document.addEventListener('click', closeCtx);

/* ══════════════════════════════════════════
   SEARCH
══════════════════════════════════════════ */
function filterCards(q) {
  q = q.toLowerCase();
  document.querySelectorAll('.card').forEach(c => {
    const id = parseInt(c.dataset.id);
    const acct = accounts.find(a => a.id === id);
    if (!acct) return;
    const t = (acct.issuer + ' ' + acct.label + ' ' + (acct.username || '')).toLowerCase();
    c.style.display = t.includes(q) ? '' : 'none';
  });
}

/* ══════════════════════════════════════════
   SHEET (Add / Edit)
══════════════════════════════════════════ */
let sheetType = 'totp';
let editingId = null;

function openSheet() {
  if (editingId === null) resetSheet();
  document.getElementById('scrim').classList.add('open');
}
function closeSheet() {
  document.getElementById('scrim').classList.remove('open');
  editingId = null;
}
function closeSheetOut(e) { if (e.target.id === 'scrim') closeSheet(); }
function simulateScan() { closeSheet(); showSnack('📷 正在从屏幕识别二维码…'); }

function setSheetType(type) {
  sheetType = type;
  document.getElementById('type-totp').classList.toggle('active', type === 'totp');
  document.getElementById('type-pw').classList.toggle('active', type === 'password');
  document.getElementById('form-totp').classList.toggle('hidden', type === 'password');
  document.getElementById('form-pw-cat').style.display = type === 'password' ? '' : 'none';
  // scan zone visible only for totp
  document.querySelector('.scan-zone').style.display = type === 'totp' ? '' : 'none';
  document.querySelector('.divider-row').style.display = type === 'totp' ? '' : 'none';
}

function resetSheet() {
  editingId = null;
  document.getElementById('sheet-title').textContent = '添加账户';
  document.getElementById('sheet-submit').innerHTML = '<span class="material-icons-round">add</span>添加账户';
  document.getElementById('fi').value = '';
  document.getElementById('fa').value = '';
  document.getElementById('fp').value = '';
  document.getElementById('fs').value = '';
  setSheetType('totp');
  // reset icon
  document.querySelectorAll('.icon-opt').forEach((o,i) => o.classList.toggle('picked', i === 0));
}

function toggleSheetPwVis() {
  const inp = document.getElementById('fp');
  const eye = document.getElementById('fp-eye');
  if (inp.type === 'password') {
    inp.type = 'text';
    eye.textContent = 'visibility_off';
  } else {
    inp.type = 'password';
    eye.textContent = 'visibility';
  }
}

function genPassword() {
  const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*';
  let pw = '';
  for (let i = 0; i < 16; i++) pw += chars[Math.floor(Math.random() * chars.length)];
  document.getElementById('fp').value = pw;
  document.getElementById('fp').type = 'text';
  document.getElementById('fp-eye').textContent = 'visibility_off';
}

function submitSheet() {
  const issuer = document.getElementById('fi').value.trim();
  const label = document.getElementById('fa').value.trim();
  const password = document.getElementById('fp').value.trim();
  const secret = document.getElementById('fs').value.trim();

  if (!issuer) { showSnack('请填写服务名称'); return; }
  if (sheetType === 'password' && !password) { showSnack('密码类型必须填写密码'); return; }

  if (editingId !== null) {
    // edit existing
    const acct = accounts.find(a => a.id === editingId);
    if (acct) {
      acct.issuer = issuer;
      acct.label = label || issuer;
      acct.username = label;
      acct.password = password || null;
      acct.type = sheetType;
      if (sheetType === 'totp') {
        acct.secret = secret || acct.secret;
        acct.cat = document.getElementById('fcat').value;
      } else {
        acct.secret = null;
        acct.cat = document.getElementById('fcat-pw').value;
      }
      // icon
      const picked = document.querySelector('.icon-opt.picked');
      if (picked) acct.icon = picked.textContent.trim();
    }
    showSnack('账户已更新');
  } else {
    // add new
    const newId = Math.max(...accounts.map(a => a.id), -1) + 1;
    const picked = document.querySelector('.icon-opt.picked');
    const icon = picked ? picked.textContent.trim() : '🔑';
    const cat = sheetType === 'totp'
      ? document.getElementById('fcat').value
      : document.getElementById('fcat-pw').value;

    accounts.push({
      id: newId,
      icon: icon,
      issuer: issuer,
      label: label || issuer,
      username: label,
      password: password || null,
      secret: sheetType === 'totp' ? (secret || null) : null,
      cat: cat,
      type: sheetType,
    });

    // add timer for totp
    if (sheetType === 'totp') {
      timers.push({t: 30});
    }

    showSnack('账户已添加');
  }

  closeSheet();
  renderList();
}

/* ── Edit ── */
function editAccount(id) {
  const acct = accounts.find(a => a.id === id);
  if (!acct) return;
  editingId = id;

  document.getElementById('sheet-title').textContent = '编辑账户';
  document.getElementById('sheet-submit').innerHTML = '<span class="material-icons-round">save</span>保存修改';

  document.getElementById('fi').value = acct.issuer;
  document.getElementById('fa').value = acct.username || '';
  document.getElementById('fp').value = acct.password || '';
  document.getElementById('fs').value = acct.secret || '';

  setSheetType(acct.type);

  if (acct.type === 'totp') {
    document.getElementById('fcat').value = acct.cat;
  } else {
    document.getElementById('fcat-pw').value = acct.cat;
  }

  // set icon
  document.querySelectorAll('.icon-opt').forEach(o => {
    o.classList.toggle('picked', o.textContent.trim() === acct.icon);
  });

  openSheet();
}

/* ── Delete ── */
function deleteAccount(id) {
  const idx = accounts.findIndex(a => a.id === id);
  if (idx === -1) return;
  // remove timer if totp
  if (accounts[idx].type === 'totp') {
    const totpIdx = accounts.filter(a => a.type === 'totp').findIndex(a => a.id === id);
    if (totpIdx !== -1) timers.splice(totpIdx, 1);
  }
  accounts.splice(idx, 1);
  renderList();
  showSnack('账户已删除');
}

/* ── Icon picker ── */
function pickIcon(el) {
  document.querySelectorAll('.icon-opt').forEach(o => o.classList.remove('picked'));
  el.classList.add('picked');
}

/* ══════════════════════════════════════════
   SNACKBAR
══════════════════════════════════════════ */
let snackTm = null;
function showSnack(msg) {
  const s = document.getElementById('snack');
  document.getElementById('snack-msg').textContent = msg;
  s.classList.add('show');
  clearTimeout(snackTm);
  snackTm = setTimeout(hideSnack, 3500);
}
function hideSnack() { document.getElementById('snack').classList.remove('show'); }

/* ══════════════════════════════════════════
   LOCK SCREEN
══════════════════════════════════════════ */
let pin = '', pinAttempts = 0;
const CORRECT_PIN = '123456'; // demo

function showLock() {
  document.getElementById('lockOv').classList.add('show');
  pin = ''; dots(); hideErr();
}

function kp(k) {
  if (k === 'bio') { unlock(); return; }
  if (pin.length >= 6) return;
  pin += k; dots();
  if (pin.length === 6) setTimeout(checkPin, 200);
}
function kpDel() {
  if (pin.length === 0) return;
  pin = pin.slice(0,-1); dots();
}

function checkPin() {
  if (pin === CORRECT_PIN) {
    pinAttempts = 0;
    unlock();
  } else {
    pinAttempts++;
    for (let i = 0; i < 6; i++) {
      const d = document.getElementById('d'+i);
      d.classList.remove('on');
      d.classList.add('err');
    }
    showErr(pinAttempts >= 3
      ? `PIN 错误（${pinAttempts} 次），请重试`
      : 'PIN 错误，请重试'
    );
    setTimeout(() => {
      for (let i = 0; i < 6; i++) {
        document.getElementById('d'+i).classList.remove('err');
      }
      pin = ''; dots();
    }, 700);
  }
}

function dots() {
  for (let i = 0; i < 6; i++)
    document.getElementById('d'+i).classList.toggle('on', i < pin.length);
}
function showErr(msg) {
  const el = document.getElementById('lockErr');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
function hideErr() { document.getElementById('lockErr').classList.remove('show'); }

function unlock() {
  document.getElementById('lockOv').classList.remove('show');
  showSnack('已解锁');
  pin = '';
}

renderList();

  showLock();
  // demo: auto type correct PIN
  ['1','2','3','4','5','6'].forEach((d,i) =>

  );
